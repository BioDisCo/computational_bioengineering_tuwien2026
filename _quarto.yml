project:
  type: book
  output-dir: _book

book:
  title: "Computational Bioengineering"
  author:
    - name: Matthias Függer
    - name: Thomas Nowak
  date: "2026"
  chapters:
    - index.qmd
    - part: "Introduction"
      chapters:
        - 01-intro/notes.ipynb
        - 01-intro/math.ipynb
        - 01-intro/cs.ipynb
    - part: "Transcription Circuits"
      chapters:
        - 02-intro/notes.ipynb

format:
  html:
    theme: cosmo
    code-fold: true
    code-tools: true
    toc: false
    number-sections: false

execute:
  freeze: auto
  enabled: false
